    // =========================================================================
    // WORD IMPORT
    // =========================================================================
    function handleWordImport(input) {
        let files = input.files;
        if (files.length === 0) return;
        
        let validFiles = Array.from(files).filter(f => {
            let ext = f.name.split('.').pop().toLowerCase();
            return ext === 'docx' || ext === 'doc';
        });
        
        if (validFiles.length === 0) {
            alert("Vui lòng chọn file .doc hoặc .docx!");
            return;
        }
        
        updateProgress(0);
        let done = 0;
        let allCadres = [];

        validFiles.forEach((file) => {
            let reader = new FileReader();
            reader.onload = function(e) {
                let arrayBuffer = e.target.result;
                let ext = file.name.split('.').pop().toLowerCase();
                
                if (ext === 'docx') {
                    try {
                        let zip = new JSZip(arrayBuffer);
                        let docFile = zip.file("word/document.xml");
                        if (docFile) {
                            let xml = docFile.asText();
                            let tables = parseDocxTables(xml);
                            
                            mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                            .then(function(result) {
                                let rawText = result.value || "";
                                processDocxWithTablesAdvanced(rawText, file.name, tables, allCadres, function() {
                                    done++;
                                    updateProgress((done / validFiles.length) * 100);
                                    if (done === validFiles.length) finishImport(allCadres);
                                });
                            }).catch(function(err) {
                                console.error("Mammoth error:", err);
                                let text = readDocxTextFromZip(arrayBuffer);
                                processTextAdvanced(text, file.name, allCadres, function() {
                                    done++;
                                    updateProgress((done / validFiles.length) * 100);
                                    if (done === validFiles.length) finishImport(allCadres);
                                });
                            });
                        } else {
                            done++;
                            if (done === validFiles.length) finishImport(allCadres);
                        }
                    } catch(e) {
                        console.error("Parse docx error:", e);
                        mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                        .then(function(result) {
                            let rawText = result.value || "";
                            processTextAdvanced(rawText, file.name, allCadres, function() {
                                done++;
                                updateProgress((done / validFiles.length) * 100);
                                if (done === validFiles.length) finishImport(allCadres);
                            });
                        }).catch(function(err) {
                            done++;
                            if (done === validFiles.length) finishImport(allCadres);
                        });
                    }
                } else {
                    mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                    .then(function(result) {
                        let rawText = result.value || "";
                        processTextAdvanced(rawText, file.name, allCadres, function() {
                            done++;
                            updateProgress((done / validFiles.length) * 100);
                            if (done === validFiles.length) finishImport(allCadres);
                        });
                    }).catch(function(err) {
                        console.error("Read .doc error:", err);
                        done++;
                        if (done === validFiles.length) finishImport(allCadres);
                    });
                }
            };
            reader.readAsArrayBuffer(file);
        });
        input.value = "";
    }

    // =========================================================================
    // PROCESS DOCX WITH TABLES - Advanced
    // =========================================================================
    function processDocxWithTablesAdvanced(rawText, fileName, tableData, allCadres, callback) {
        if (!rawText && tableData.length === 0) {
            callback();
            return;
        }
        
        // 1. Trích xuất tên Khoa/Bộ môn
        let deptName = extractDepartmentName(rawText);
        let deptId = null;
        if (deptName) {
            let found = departments.find(d => d.name.toLowerCase().includes(deptName.toLowerCase()) || deptName.toLowerCase().includes(d.name.toLowerCase()));
            if (found) {
                deptId = found.id;
            } else {
                let newDept = {
                    id: nextDepartmentId++,
                    name: deptName,
                    color: "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')
                };
                departments.push(newDept);
                deptId = newDept.id;
                renderDepartments();
                saveDepartmentsToLocal();
                showToast(`Đã thêm Khoa mới: ${deptName}`);
            }
        }
        
        // 2. Tách văn bản thành các Section của từng cán bộ
        let sections = splitIntoCadreSectionsAdvanced(rawText);
        
        // 3. Trích xuất dữ liệu Phụ lục Khoa (Bảng tổng hợp cuối file)
        let appendixData = extractAppendixFromTables(tableData);
        let appendixMap = {};
        if (appendixData) {
            appendixData.forEach((row, idx) => {
                if (row && row.length > 1) {
                    let stt = parseInt(row[0]) || (idx + 1);
                    appendixMap[stt] = row;
                }
            });
        }
        
        // KỸ THUẬT CỐT LÕI: Biến con trỏ toàn cục để theo dõi vị trí bảng trong file Word
        let tableGlobalIdx = 0; 
        
        sections.forEach((section, idx) => {
            // Parse thông tin cá nhân (Mục 1 đến Mục 8)
            let parsed = parseSingleCadreAdvanced(section, fileName + "_" + (idx+1));
            
            if (deptId) {
                parsed.department_id = deptId;
            }
            
            // Ánh xạ dữ liệu phụ lục nếu khớp số thứ tự cán bộ
            let stt = idx + 1;
            if (appendixMap[stt]) {
                mapAppendixDataToCadre(parsed, appendixMap[stt]);
            }
            
            // 4. Tìm các mục từ 9 đến 16 xuất hiện trong văn bản của cán bộ này
            let orderList = [];
            let orderPattern = /([0-9]+)\.\s*(Quá trình đào tạo|Quá trình công tác|Các công trình công bố|Số lượng văn bằng|Số công trình được áp dụng|Các nhiệm vụ KH&CN|Giải thưởng|Thành tựu)/gi;
            let m;
            while ((m = orderPattern.exec(section)) !== null) {
                let num = parseInt(m[1]);
                if (num >= 9 && num <= 16) {
                    orderList.push(num);
                }
            }
            
            // 5. Phân bổ tuần tự các bảng vào đúng danh mục của cán bộ
            if (orderList.length > 0) {
                orderList.forEach((num) => {
                    let tableId = sectionTableMap[num]; // Lấy string key tương ứng (ví dụ: 'dao_tao', 'cong_tac')
                    
                    // Kiểm tra xem bảng tại vị trí con trỏ toàn cục có tồn tại hay không
                    if (tableId && tableData[tableGlobalIdx]) {
                        // Tạo một bản sao nông (shallow copy) của bảng để tránh làm hỏng mảng tableData gốc
                        let data = [...tableData[tableGlobalIdx]]; 
                        
                        if (data && data.length > 0) {
                            let firstRow = data[0];
                            // Nhận diện hàng tiêu đề (Header)
                            let isHeader = firstRow.some(c => /^STT|^TT|^T[0-9]|^Bậc|^Thời gian|^Tên|^Hình|^Nội dung|^Vị trí|^Cấp|^Họ và tên|^Ngày|^Số|^Tác giả|^Nơi công bố|^Chức|^Bậc đào|^Vị trí/i.test(c));
                            if (isHeader && data.length > 1) {
                                data = data.slice(1); // Loại bỏ dòng tiêu đề, chỉ giữ lại data rows
                            }
                        }
                        
                        // Gán bảng đã sạch tiêu đề vào đúng object cán bộ
                        parsed.tables[tableId] = data;
                    }
                    
                    // ĐÃ XỬ LÝ XONG BẢNG NÀY -> Tăng con trỏ lên 1 để cán bộ/mục tiếp theo lấy bảng kế tiếp
                    tableGlobalIdx++; 
                });
            }
            
            // Khử trùng lặp hoặc gán tên file làm tên mặc định nếu lỗi OCR không quét được mục 1. Họ và tên
            if (!parsed.fullname || parsed.fullname.trim() === "") {
                parsed.fullname = fileName.replace(/\.(docx|doc)$/i, "").replace(/_\d+$/, "");
            }
            
            allCadres.push(parsed);
        });
        
        callback();
    }

    function extractDepartmentName(text) {
        // Tìm dòng KHOA: tên khoa
        let match = text.match(/KHOA\s*[:]\s*([^\n]+)/i);
        if (match) {
            let deptName = match[1].trim();
            // Loại bỏ dấu xuống dòng và khoảng trắng thừa
            deptName = deptName.replace(/[\r\n]+/g, '').trim();
            return deptName;
        }
        return null;
    }

    function extractAppendixFromTables(tableData) {
        for (let table of tableData) {
            if (table && table.length > 0) {
                let firstRow = table[0];
                // Kiểm tra header của bảng phụ lục
                if (firstRow && firstRow.some(c => /PHỤ LỤC/i.test(c))) {
                    let result = [];
                    // Bỏ qua 2 dòng header (dòng tiêu đề và dòng GVC/GVG CB)
                    // Bắt đầu từ dòng thứ 3 là dữ liệu
                    for (let i = 2; i < table.length; i++) {
                        let row = table[i];
                        if (row && row.length >= 3) {
                            result.push(row);
                        }
                    }
                    return result;
                }
            }
        }
        return null;
    }

    function mapAppendixDataToCadre(parsed, appendixRow) {
        if (!appendixRow || appendixRow.length < 3) return;

        let parseNum = (val) => {
            if (!val) return 0;
            let clean = val.toString().replace(/…|\./g, "").trim();
            let num = parseInt(clean);
            return isNaN(num) ? 0 : num;
        };

        let parseChucDanh = (val) => {
            if (!val) return 0;
            let clean = val.toString().replace(/…|\./g, "").trim().toLowerCase();
            if (clean === "" || clean === "0") return 0;
            return 1; 
        };

        // Mapping theo đúng vị trí cột trong bảng phụ lục file Word
        parsed.appendixData = {
            // Chức danh (cột 2, 3)
            chuc_danh_gvc: parseChucDanh(appendixRow[2]),
            chuc_danh_gvg_cb: parseChucDanh(appendixRow[3]),
            
            // Đề tài NN (cột 4, 5)
            de_tai_nn_cn: parseNum(appendixRow[4]),
            de_tai_nn_tg: parseNum(appendixRow[5]),
            // Đề tài BQP (cột 6, 7)
            de_tai_bqp_cn: parseNum(appendixRow[6]),
            de_tai_bqp_tg: parseNum(appendixRow[7]),
            // Đề tài BTTM (cột 8, 9)
            de_tai_bttm_cn: parseNum(appendixRow[8]),
            de_tai_bttm_tg: parseNum(appendixRow[9]),
            // Đề tài Trg (cột 10, 11)
            de_tai_trg_cn: parseNum(appendixRow[10]),
            de_tai_trg_tg: parseNum(appendixRow[11]),
            
            // Sáng kiến BTTM (cột 12, 13)
            sang_kien_bttm_cn: parseNum(appendixRow[12]),
            sang_kien_bttm_tg: parseNum(appendixRow[13]),
            // Sáng kiến Trg (cột 14, 15)
            sang_kien_trg_cn: parseNum(appendixRow[14]),
            sang_kien_trg_tg: parseNum(appendixRow[15]),
            
            // Giáo trình BTTM (cột 16, 17)
            giao_trinh_bttm_cn: parseNum(appendixRow[16]),
            giao_trinh_bttm_tg: parseNum(appendixRow[17]),
            // Giáo trình Trg (cột 18, 19)
            giao_trinh_trg_cn: parseNum(appendixRow[18]),
            giao_trinh_trg_tg: parseNum(appendixRow[19]),
            
            // Tài liệu BTTM (cột 20, 21)
            tai_lieu_bttm_cn: parseNum(appendixRow[20]),
            tai_lieu_bttm_tg: parseNum(appendixRow[21]),
            // Tài liệu Trg (cột 22, 23)
            tai_lieu_trg_cn: parseNum(appendixRow[22]),
            tai_lieu_trg_tg: parseNum(appendixRow[23]),
            
            // Bài báo (cột 24, 25)
            bai_bao_tgc: parseNum(appendixRow[24]),
            bai_bao_tg: parseNum(appendixRow[25]),
            
            // Ghi chú (cột 26)
            ghi_chu: appendixRow[26] || ''
        };
    }

    function splitIntoCadreSectionsAdvanced(text) {
        let sections = [];
        // Tìm tất cả các mục "1. Họ và tên:"
        let pattern = /1\.\s*Họ và tên\s*[:.]\s*([^,\n;]+)/gi;
        let match;
        let matches = [];
        
        while ((match = pattern.exec(text)) !== null) {
            matches.push({
                start: match.index,
                end: pattern.lastIndex,
                name: match[1].trim()
            });
        }
        
        if (matches.length === 0) {
            // Fallback: tìm các mục số
            let pattern2 = /(\d+\.\s*[A-ZÀ-Ỹ][^:\n]*?:)/gi;
            let match2;
            let lastIdx = 0;
            let sections2 = [];
            while ((match2 = pattern2.exec(text)) !== null) {
                if (match2[1].startsWith('1.')) {
                    if (lastIdx > 0) {
                        sections2.push(text.substring(lastIdx, match2.index).trim());
                    }
                    lastIdx = match2.index;
                }
            }
            if (lastIdx > 0) {
                sections2.push(text.substring(lastIdx).trim());
            }
            if (sections2.length > 0) {
                return sections2;
            }
            return [text];
        }
        
        for (let i = 0; i < matches.length; i++) {
            let start = matches[i].start;
            // Kết thúc section khi gặp section tiếp theo hoặc hết file
            let end = (i < matches.length - 1) ? matches[i + 1].start : text.length;
            let section = text.substring(start, end).trim();
            if (section.length > 50) {
                sections.push(section);
            }
        }
        
        return sections;
    }

    function parseSingleCadreAdvanced(text, filename) {
        let parsed = {
            fullname: "",
            birthday: "", gender: "",
            ccid: "",
            academic_title: "", academic_title_year: "",
            academic_degree: "", academic_degree_year: "",
            research_title: "", // Trường lưu Chức danh nghiên cứu sạch
            position: "",       // Trường lưu Chức vụ sạch
            phone_org: "", phone_personal: "",
            address: "", email: "",
            organization: "", leader_name: "", leader_phone: "", org_address: "",
            rank: "", department_id: null,
            tables: {
                tableTraining: [],
                tableWork: [],
                tablePublication: [],
                tablePatent: [],
                tableApplication: [],
                tableTask: [],
                tableAward: [],
                tableAchievement: []
            }
        };

        // --- MỤC 1: HỌ VÀ TÊN (Cho phép dấu phẩy nếu có tên đệm đặc biệt) ---
        parsed.fullname = extractAdvanced(text, /1\.\s*Họ và tên\s*[:.]\s*([^\n;]+)/i) ||
                           extractAdvanced(text, /Họ và tên\s*[:.]\s*([^\n;]+)/i) ||
                           filename.replace(/\.(docx|doc)$/i, "").replace(/_\d+$/, "");
        if (parsed.fullname) parsed.fullname = parsed.fullname.trim();

        // --- MỤC 2: NGÀY SINH & GIỚI TÍNH ---
        parsed.birthday = extractAdvanced(text, /2\.\s*Ngày\/tháng\/năm sinh\s*[:.]\s*([^\n;]+?)(?=\s*Nam\/Nữ|$)/i) ||
                          extractAdvanced(text, /Ngày\/tháng\/năm sinh\s*[:.]\s*([^\n;]+)/i);
        if (parsed.birthday) parsed.birthday = parsed.birthday.trim();
        
        let genderMatch = text.match(/2\.\s*Ngày\/tháng\/năm sinh[^]*?,\s*Nam\/Nữ\s*[:.]\s*([^\n;]+)/i);
        parsed.gender = genderMatch ? genderMatch[1].trim() : (extractAdvanced(text, /Nam\/Nữ\s*[:.]\s*([^\n;]+)/i) || "");

        // --- MỤC 3: CCCD ---
        parsed.ccid = extractAdvanced(text, /3\.\s*Số định danh cá nhân\/CCCD\s*[:.]\s*([^\n;]+)/i) ||
                      extractAdvanced(text, /CCCD\s*[:.]\s*([^\n;]+)/i) ||
                      extractAdvanced(text, /Số định danh\s*[:.]\s*([^\n;]+)/i);
        if (parsed.ccid) parsed.ccid = parsed.ccid.trim();

        // --- MỤC 4: HỌC HÀM, HỌC VỊ ---
        let section4 = findSectionAdvanced(text, /4\.\s*Học hàm[^]*?(?=5\.\s*Chức danh|$)/i);
        if (section4) {
            parsed.academic_title = extractAdvanced(section4, /Học hàm\s*[:.]\s*([^\n;]+?)(?=\s*Năm được phong|$)/i);
            parsed.academic_title_year = extractAdvanced(section4, /Năm được phong học hàm\s*[:.]\s*([^\n;]+)/i);
            parsed.academic_degree = extractAdvanced(section4, /Học vị\s*[:.]\s*([^\n;]+?)(?=\s*Năm đạt|$)/i);
            parsed.academic_degree_year = extractAdvanced(section4, /Năm đạt học vị\s*[:.]\s*([^\n;]+)/i);
        }
        if (!parsed.academic_title) parsed.academic_title = extractAdvanced(text, /Học hàm\s*[:.]\s*([^\n;]+?)(?=\s*Năm|$)/i);
        if (!parsed.academic_degree) parsed.academic_degree = extractAdvanced(text, /Học vị\s*[:.]\s*([^\n;]+?)(?=\s*Năm|$)/i);

        // --- MỤC 5: CHỨC DANH NGHIÊN CỨU & CHỨC VỤ (Sửa lỗi mất thông tin sau dấu phẩy) ---
        let resTitleMatch = text.match(/Chức danh nghiên cứu\s*[:.]\s*([^]*?)(?=\s*Chức vụ|$)/i);
        if (resTitleMatch) {
            parsed.research_title = resTitleMatch[1].replace(/[.…\s]+/g, ' ').trim();
            // Nếu chỉ chứa toàn dấu chấm hoặc trống thì xóa sạch
            if (/^[^A-Za-z0-9À-ỹ]*$/.test(parsed.research_title)) parsed.research_title = "";
        }

        // 2. Lấy toàn bộ đoạn text từ sau chữ "Chức vụ:" đến trước tiêu đề "6. Điện thoại"
        let positionMatch = text.match(/Chức vụ\s*[:.]\s*([^]*?)(?=\s*6\.\s*Điện thoại|$)/i);
        if (positionMatch) {
            // Loại bỏ hoàn toàn dấu chấm lửng mẫu, giữ nguyên dấu phẩy và khoảng trắng đơn
            parsed.position = positionMatch[1].replace(/[.…]+/g, '').replace(/[\r\n]+/g, ' ').trim();
        }

        // Fallback chéo nếu một trong hai mục bị thiếu
        if (!parsed.position && parsed.research_title) {
            parsed.position = parsed.research_title;
        }

        // --- MỤC 6: ĐIỆN THOẠI (Sửa lỗi mất số điện thoại tổ chức) ---
        let section6 = findSectionAdvanced(text, /6\.\s*Điện thoại[^]*?(?=7\.\s*Địa chỉ|$)/i);
        if (section6) {
            // 1. Tìm số cá nhân trước
            let personalMatch = section6.match(/Cá nhân\s*[:.]\s*([\d\s.-]{7,15})/i);
            if (personalMatch) parsed.phone_personal = personalMatch[1].trim();

            // 2. Lấy dữ liệu nằm GIỮA nhãn "Tổ chức:" và "Cá nhân:" nhằm quét sạch dấu chấm lửng định dạng mẫu (.....)
            let orgBlockMatch = section6.match(/Tổ chức\s*[:.]\s*([^]*?)(?=\s*Cá nhân|$)/i);
            if (orgBlockMatch) {
                let cleanOrg = orgBlockMatch[1].replace(/\./g, '').replace(/[^\d-]/g, '').trim();
                if (cleanOrg.length >= 7) {
                    parsed.phone_org = cleanOrg;
                }
            }
        }
        // Fallbacks toàn cục cho mục 6
        if (!parsed.phone_personal) parsed.phone_personal = extractAdvanced(text, /Cá nhân\s*[:.]\s*([\d\s.-]{7,15})/i) || "";
        if (!parsed.phone_org) {
            let globalOrgMatch = text.match(/Tổ chức\s*[:.]\s*([^]*?)(?=\s*Cá nhân|$)/i);
            if (globalOrgMatch) {
                let cleanGlobalOrg = globalOrgMatch[1].replace(/\./g, '').replace(/[^\d-]/g, '').trim();
                if (cleanGlobalOrg.length >= 7) parsed.phone_org = cleanGlobalOrg;
            }
        }

        // --- MỤC 7: ĐỊA CHỈ & EMAIL CÁ NHÂN (Cho phép chứa dấu phẩy địa chỉ) ---
        let section7 = findSectionAdvanced(text, /7\.\s*Địa chỉ[^]*?(?=8\.\s*Tổ chức|$)/i);
        if (section7) {
            parsed.address = extractAdvanced(section7, /Địa chỉ\s*[:.]\s*([^]*?)(?=\s*E-mail|$)/i);
            parsed.email = extractAdvanced(section7, /E-mail\s*[:.]\s*([^\s,;]+)/i);
        }
        if (!parsed.address) parsed.address = extractAdvanced(text, /Địa chỉ[:\s]*([^\r\n]+)/i);
        if (!parsed.email) parsed.email = extractAdvanced(text, /E-mail\s*[:.]\s*([^\s,;]+)/i);
        if (parsed.address) parsed.address = parsed.address.replace(/\.+$/, '').trim();

        // --- MỤC 8: THÔNG TIN TỔ CHỨC CHỨA ĐỊA CHỈ ĐẦY ĐỦ (Sửa lỗi mất thông tin sau dấu phẩy) ---
        let block8 = text.match(/8\.\s*Tổ chức[^]*?(?=9\.\s*Quá trình|$)/i);
        if (block8) {
            let content8 = block8[0];

            // Trích xuất tên tổ chức
            let orgMatch = content8.match(/Tên tổ chức\s*[:.]\s*([^]*?)(?=\s*Tên người lãnh đạo|$)/i);
            if (orgMatch) parsed.organization = orgMatch[1].trim().replace(/^[:.\s]+/, '');

            // Trích xuất tên lãnh đạo
            let leaderMatch = content8.match(/Tên người lãnh đạo\s*[:.]\s*([^]*?)(?=\s*Điện thoại người lãnh đạo|$)/i);
            if (leaderMatch) parsed.leader_name = leaderMatch[1].trim().replace(/^[:.\s]+/, '');

            // Trích xuất điện thoại lãnh đạo
            let leadPhoneMatch = content8.match(/Điện thoại người lãnh đạo\s*[:.]\s*([^]*?)(?=\s*Địa chỉ|$)/i);
            if (leadPhoneMatch) parsed.leader_phone = leadPhoneMatch[1].trim().replace(/^[:.\s]+/, '');

            // TRÍCH XUẤT ĐỊA CHỈ: Lấy toàn bộ đoạn text từ chữ "Địa chỉ:" cho đến hết block8
            let addrMatch = content8.match(/Địa chỉ\s*[:.]\s*([^]*?)$/i);
            if (addrMatch) {
                // Chỉ dọn dẹp dấu chấm lửng/xuống dòng dư thừa ở đầu và cuối chuỗi, GIỮ NGUYÊN toàn bộ dấu phẩy bên trong câu
                let cleanAddr = addrMatch[1].replace(/^[:.\s]+/, '').replace(/[\r\n]+/g, ' ').replace(/\.+$/, '').trim();
                parsed.org_address = cleanAddr;
            }
        }

        // Fallbacks an toàn trên toàn văn bản nếu block8 bị lỗi không bắt được cấu trúc
        if (!parsed.organization) parsed.organization = extractAdvanced(text, /Tên tổ chức\s*[:.]\s*([^\r\n]+)/i) || "";
        if (!parsed.org_address) {
            let globalAddr = extractAdvanced(text, /Địa chỉ\s*[:.]\s*([^]*?)(?=9\.\s*Quá trình|$)/i);
            if (globalAddr) parsed.org_address = globalAddr.replace(/[\r\n]+/g, ' ').replace(/\.+$/, '').trim();
        }

        // --- CÁC MỤC BẢNG BIỂU TỪ 9 ĐẾN 16 ---
        let trainingSection = findSectionByNumberAdvanced(text, 9, "đào tạo");
        if (trainingSection) {
            parsed.tables.tableTraining = parseTableContentAdvanced(trainingSection, 4);
        }
        
        let workSection = findSectionByNumberAdvanced(text, 10, "công tác");
        if (workSection) {
            parsed.tables.tableWork = parseTableContentAdvanced(workSection, 4);
        }
        
        let pubSection = findSectionByNumberAdvanced(text, 11, "công bố");
        if (pubSection) {
            parsed.tables.tablePublication = parseTableContentAdvanced(pubSection, 5);
        }
        
        let patentSection = findSectionByNumberAdvanced(text, 12, "bảo hộ");
        if (patentSection) {
            parsed.tables.tablePatent = parseTableContentAdvanced(patentSection, 3);
        }
        
        let appSection = findSectionByNumberAdvanced(text, 13, "áp dụng");
        if (appSection) {
            parsed.tables.tableApplication = parseTableContentAdvanced(appSection, 4);
        }
        
        let taskSection = findSectionByNumberAdvanced(text, 14, "nhiệm vụ");
        if (taskSection) {
            parsed.tables.tableTask = parseTableContentAdvanced(taskSection, 5);
        }
        
        let awardSection = findSectionByNumberAdvanced(text, 15, "giải thưởng");
        if (awardSection) {
            parsed.tables.tableAward = parseTableContentAdvanced(awardSection, 3);
        }
        
        let achSection = findSectionByNumberAdvanced(text, 16, "thành tựu");
        if (achSection) {
            parsed.tables.tableAchievement = parseTableContentAdvanced(achSection, 3);
        }
        
        return parsed;
    }

    function extractAdvanced(text, pattern) {
        let m = text.match(pattern);
        if (m && m[1]) {
            let value = m[1].trim();
            if (value.includes(',')) {
                value = value.split(',')[0].trim();
            }
            return value.replace(/[.;:\t]+$/, "").trim();
        }
        return "";
    }

    function findSectionAdvanced(text, pattern) {
        let match = text.match(pattern);
        return (match && match[0]) ? match[0] : null;
    }

    function findSectionByNumberAdvanced(text, number, keyword) {
        if (!text) return null;
        
        // Chuẩn hóa chuỗi tìm kiếm keyword để an toàn cho Regex
        let safeKeyword = keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        
        let patterns = [
            // Trường hợp 1: Chuẩn hóa theo số mục "X. Tiêu đề" -> Quét đến khi gặp mục số tiếp theo "Y." hoặc kết thúc chuỗi
            new RegExp(number + `\\.\\s*` + safeKeyword + `[^]*?(?=\\s*\\b` + (parseInt(number) + 1) + `\\.\\s*|\\s*\\b[0-9]+\\.\\s*[A-Za-zÀ-ỹ]|\\s*PHỤ LỤC|\\s*$)`, 'i'),
            
            // Trường hợp 2: Dạng dòng đơn "X. Tiêu đề: nội dung" (Nuốt từ tiêu đề đến mục số tiếp theo bất kỳ)
            new RegExp(number + `\\.\\s*` + safeKeyword + `[^]*?(?=\\s*\\b[0-9]+\\.\\s*|\\s*PHỤ LỤC|\\s*$)`, 'i'),
            
            // Trường hợp 3: Dấu gạch ngang thay vì dấu chấm "X - Tiêu đề"
            new RegExp(number + `\\s*[-–]\\s*` + safeKeyword + `[^]*?(?=\\s*\\b[0-9]+\\s*[-–]|\\s*$)`, 'i'),
            
            // Trường hợp 4: Khớp không cần số (Fallback chỉ tìm theo Keyword)
            new RegExp(`(?:` + safeKeyword + `)[^]*?(?=\\s*\\b[0-9]+\\.\\s*|\\s*PHỤ LỤC|\\s*$)`, 'i')
        ];
        
        for (let pattern of patterns) {
            let match = text.match(pattern);
            if (match) {
                let fullMatch = match[0];
                // Loại bỏ phần tiêu đề "X. Tiêu đề" ra khỏi kết quả trả về để chỉ lấy nội dung phía sau
                let headerRegex = new RegExp(`^\\s*` + number + `\\.\\s*` + safeKeyword + `\\s*[:.]?\\s*`, 'i');
                let content = fullMatch.replace(headerRegex, '').trim();
                
                // HẠ ĐIỀU KIỆN: Chỉ cần độ dài > 2 ký tự và chứa chữ/số là chấp nhận (Giúp giữ lại số điện thoại hoặc địa chỉ ngắn)
                if (content.length >= 2 && content.match(/[A-Za-zÀ-ỹ0-9]/)) {
                    return content;
                }
            }
        }
        return null;
    }

    function parseTableContentAdvanced(text, colCount) {
        let rows = [];
        let lines = text.split('\n').filter(l => l.trim().length > 0);
        
        let tableData = [];
        let inTable = false;
        let headerSkipped = false;
        let headerFound = false;
        
        for (let line of lines) {
            let trimmed = line.trim();
            
            if (trimmed.includes('|') || (trimmed.includes('+') && trimmed.includes('-'))) {
                inTable = true;
                if (/^[\+\-\|]+$/.test(trimmed.replace(/\s/g, ''))) {
                    if (!headerFound) {
                        headerFound = true;
                        headerSkipped = true;
                    }
                    continue;
                }
                
                let cells = trimmed.split('|').map(c => c.trim()).filter(c => c.length > 0);
                if (cells.length >= 2) {
                    let isHeader = cells.some(c => /^STT|^TT|^T[0-9]|^Bậc|^Thời gian|^Tên|^Hình|^Nội dung|^Vị trí|^Cấp|^Họ và tên|^Ngày|^Số|^Tác giả|^Nơi công bố|^Chức|^Bậc đào|^Vị trí/i.test(c));
                    
                    if (isHeader) {
                        headerFound = true;
                        headerSkipped = true;
                        continue;
                    }
                    
                    if (headerSkipped) {
                        while (cells.length < colCount) cells.push("");
                        if (cells.some(c => c.length > 0)) {
                            tableData.push(cells.slice(0, colCount));
                        }
                    }
                }
                continue;
            }
            if (inTable && trimmed.length === 0) {
                inTable = false;
            }
        }
        
        if (tableData.length > 0) {
            return tableData;
        }
        
        let dataRows = [];
        let foundHeader = false;
        let headerRowFound = false;
        
        for (let line of lines) {
            let trimmed = line.trim();
            
            if (!foundHeader) {
                let headerMatch = trimmed.match(/(STT|TT|Thời gian|Tên|Nội dung|Hình thức|Địa chỉ|Bậc|Vị trí|Chức vụ|Cấp bậc|Tổ chức|Tác giả|Nơi công bố|Chức|Bậc đào|Vị trí)/i);
                if (headerMatch) {
                    let headers = trimmed.split(/\s{3,}/).map(c => c.trim()).filter(c => c.length > 0);
                    if (headers.length < 2) headers = trimmed.split('\t').map(c => c.trim()).filter(c => c.length > 0);
                    foundHeader = true;
                    headerRowFound = true;
                    continue;
                }
            }
            
            if (foundHeader && trimmed.length > 0 && !headerRowFound) {
                headerRowFound = true;
                continue;
            }
            
            if (foundHeader && headerRowFound && trimmed.length > 0) {
                let cells = trimmed.split(/\s{3,}/).map(c => c.trim()).filter(c => c.length > 0);
                if (cells.length < 2) cells = trimmed.split('\t').map(c => c.trim()).filter(c => c.length > 0);
                if (cells.length >= 2) {
                    let isHeader = cells.some(c => /^STT|^TT|^T[0-9]|^Bậc|^Thời gian|^Tên|^Hình|^Nội dung|^Vị trí|^Cấp|^Họ và tên|^Ngày|^Số|^Tác giả|^Nơi công bố|^Chức|^Bậc đào|^Vị trí/i.test(c));
                    if (!isHeader) {
                        while (cells.length < colCount) cells.push("");
                        if (cells.some(c => c.length > 0)) {
                            dataRows.push(cells.slice(0, colCount));
                        }
                    }
                }
            }
        }
        
        if (dataRows.length > 0) {
            return dataRows;
        }
        
        return rows;
    }

    function processTextAdvanced(rawText, fileName, allCadres, callback) {
        if (!rawText || rawText.length < 50) {
            callback();
            return;
        }
        
        let sections = splitIntoCadreSectionsAdvanced(rawText);
        if (sections.length === 0) {
            sections = [rawText];
        }
        
        sections.forEach((section, i) => {
            let parsed = parseSingleCadreAdvanced(section, fileName + "_" + (i+1));
            if (parsed && parsed.fullname) {
                allCadres.push(parsed);
            }
        });
        callback();
    }

    function finishImport(allCadres) {
        if (allCadres.length > 0) {
            cadresDatabase = cadresDatabase.concat(allCadres);
            applySearchFilter();
            renderDepartments();
            showToast(`Đã nhập thành công ${allCadres.length} hồ sơ.`);
            if (filteredDatabase.length > 0) setActiveIndex(0);
            if (currentDeptFilter !== null) renderDeptAppendix(currentDeptFilter);
            else renderSystemAppendix();
        } else {
            alert("Không tìm thấy dữ liệu hồ sơ trong các file đã chọn.");
        }
        updateProgress(100);
        setTimeout(() => updateProgress(0), 1000);
    }

    function readDocxTextFromZip(arrayBuffer) {
        try {
            let zip = new JSZip(arrayBuffer);
            let docFile = zip.file("word/document.xml");
            if (docFile) {
                let xml = docFile.asText();
                return xml.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
            }
            return "";
        } catch(e) {
            return "";
        }
    }

    function parseDocxTables(xml) {
        let tables = [];
        let tblRegex = /<w:tbl[^>]*>([\s\S]*?)<\/w:tbl>/gi;
        let match;
        while ((match = tblRegex.exec(xml)) !== null) {
            let tblContent = match[1];
            let rows = [];
            let trRegex = /<w:tr[^>]*>([\s\S]*?)<\/w:tr>/gi;
            let trMatch;
            while ((trMatch = trRegex.exec(tblContent)) !== null) {
                let trContent = trMatch[1];
                let cells = [];
                let tcRegex = /<w:tc[^>]*>([\s\S]*?)<\/w:tc>/gi;
                let tcMatch;
                while ((tcMatch = tcRegex.exec(trContent)) !== null) {
                    let tcContent = tcMatch[1];
                    let text = tcContent.replace(/<w:p[^>]*>([\s\S]*?)<\/w:p>/gi, function(m, p1) {
                        return p1.replace(/<[^>]*>/g, '').trim();
                    }).replace(/<[^>]*>/g, '').trim();
                    if (!text) {
                        let tRegex = /<w:t[^>]*>([\s\S]*?)<\/w:t>/gi;
                        let tMatch;
                        while ((tMatch = tRegex.exec(tcContent)) !== null) {
                            text += tMatch[1].trim() + ' ';
                        }
                        text = text.trim();
                    }
                    cells.push(text);
                }
                if (cells.length > 0) {
                    rows.push(cells);
                }
            }
            if (rows.length > 0) {
                tables.push(rows);
            }
        }
        return tables;
    }

    // =========================================================================
    // SIDEBAR TOGGLE - Hỗ trợ cả hover và touch
    // =========================================================================
    $(document).ready(function() {
        var sidebarWrapper = $('#sidebarWrapper');
        var sidebarTrigger = $('#sidebarTrigger');
        var sidebarOverlay = $('#sidebarOverlay');
        var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        // Xác định thiết bị touch
        if (isTouchDevice) {
            sidebarWrapper.addClass('touch-device');
        }
        
        // Click vào trigger để toggle sidebar (cả desktop và mobile)
        sidebarTrigger.on('click touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (sidebarWrapper.hasClass('touch-active')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });
        
        // Click vào overlay để đóng sidebar
        sidebarOverlay.on('click touchstart', function(e) {
            e.preventDefault();
            closeSidebar();
        });
        
        // Vuốt từ mép trái để mở sidebar (touch)
        var touchStartX = 0;
        var touchStartY = 0;
        var isSwiping = false;
        
        $(document).on('touchstart', function(e) {
            touchStartX = e.originalEvent.touches[0].clientX;
            touchStartY = e.originalEvent.touches[0].clientY;
            isSwiping = false;
        });
        
        $(document).on('touchmove', function(e) {
            if (touchStartX === 0) return;
            var touchX = e.originalEvent.touches[0].clientX;
            var touchY = e.originalEvent.touches[0].clientY;
            var diffX = touchX - touchStartX;
            var diffY = touchY - touchStartY;
            
            // Kiểm tra vuốt ngang từ mép trái
            if (Math.abs(diffX) > Math.abs(diffY) && touchStartX < 30 && diffX > 30) {
                isSwiping = true;
                e.preventDefault();
                if (!sidebarWrapper.hasClass('touch-active')) {
                    openSidebar();
                }
            }
        });
        
        $(document).on('touchend', function(e) {
            touchStartX = 0;
            touchStartY = 0;
            isSwiping = false;
        });
        
        // Đóng sidebar khi click ra ngoài (desktop)
        $(document).click(function(e) {
            if (!$(e.target).closest('.sidebar-wrapper').length && !$(e.target).closest('.sidebar-overlay').length) {
                if (sidebarWrapper.hasClass('touch-active')) {
                    closeSidebar();
                }
            }
        });
        
        function openSidebar() {
            sidebarWrapper.addClass('touch-active');
            sidebarOverlay.addClass('active');
            $('body').css('overflow', 'hidden');
        }
        
        function closeSidebar() {
            sidebarWrapper.removeClass('touch-active');
            sidebarOverlay.removeClass('active');
            $('body').css('overflow', '');
        }
        
        // Hover behavior cho desktop (giữ nguyên)
        sidebarWrapper.on('mouseenter', function() {
            if (!isTouchDevice && !sidebarWrapper.hasClass('touch-active')) {
                // Hover tự động hiển thị
            }
        });
        
        sidebarWrapper.on('mouseleave', function() {
            if (!isTouchDevice && !sidebarWrapper.hasClass('touch-active')) {
                // Tự động ẩn khi rời chuột
            }
        });
        
        // Đóng sidebar khi resize sang desktop
        $(window).on('resize', function() {
            if ($(window).width() > 768 && sidebarWrapper.hasClass('touch-active')) {
                closeSidebar();
            }
        });
    });
